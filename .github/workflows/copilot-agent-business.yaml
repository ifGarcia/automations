name: 🤖 Copilot CLI Agent (Business Plan) - File Editor

on:
  workflow_dispatch:
    inputs:
      target_files:
        description: 'Padrão de arquivos (ex: *.py, *.yaml, **/*.js)'
        required: false
        default: '*.py'
      instruction:
        description: 'Instrução para o agente'
        required: false
        default: 'Adicione comentários técnicos explicativos em português'
      max_files:
        description: 'Máximo de arquivos a processar'
        required: false
        default: '20'
      model:
        description: 'Modelo a usar'
        required: false
        default: 'claude-sonnet-4.5'
        type: choice
        options:
          - claude-sonnet-4.5
          - claude-3.5-sonnet
          - gpt-4
          - gpt-4-turbo

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-agent:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # FASE 1: SETUP E VERIFICAÇÃO
      # ========================================
      
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.COPILOT_BUSINESS_TOKEN }}  # PAT permite editar workflows
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install GitHub Copilot CLI
        run: |
          echo "📦 Instalando Copilot CLI..."
          curl -fsSL https://github.com/github/copilot-cli/releases/latest/download/copilot-linux-x64.tar.gz -o copilot.tar.gz
          tar -xzf copilot.tar.gz
          sudo mv copilot /usr/local/bin/
          chmod +x /usr/local/bin/copilot
          
          # Remove arquivo de instalação para não commitar
          rm -f copilot.tar.gz
          
          echo "✅ Copilot CLI instalado"
          copilot --version
      
      - name: 🔐 Setup GitHub CLI Authentication
        env:
          GH_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "🔐 Configurando autenticação GitHub CLI..."
          
          # GitHub CLI usa GH_TOKEN automaticamente (não-interativo)
          gh auth status
          
          echo "✅ Autenticação configurada"
      
      - name: 🤖 Setup Copilot CLI Authentication
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "🤖 Configurando Copilot CLI..."
          
          # Copilot CLI precisa de GITHUB_TOKEN no ambiente
          # Verifica se o token está disponível
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "❌ ERRO: COPILOT_BUSINESS_TOKEN não está configurado"
            echo "Configure em: Settings → Secrets → COPILOT_BUSINESS_TOKEN"
            exit 1
          fi
          
          # Valida tipo de token (Copilot não aceita Classic PAT)
          if [[ "$GITHUB_TOKEN" == ghp_* ]]; then
            echo "❌ ERRO: Token Clássico (ghp_) não é suportado pelo Copilot CLI"
            echo ""
            echo "O Copilot CLI requer um Fine-Grained Personal Access Token (github_pat_)."
            echo ""
            echo "🔧 Como corrigir:"
            echo "1. Acesse: https://github.com/settings/tokens?type=beta"
            echo "2. Clique em 'Generate new token' (Fine-grained)"
            echo "3. Configure:"
            echo "   - Token name: Copilot Business Token"
            echo "   - Expiration: Escolha a duração"
            echo "   - Repository access: All repositories (ou específicos)"
            echo "   - Permissions:"
            echo "     • Contents: Read and write"
            echo "     • Pull requests: Read and write"
            echo "     • Copilot: Read (se disponível)"
            echo "4. Gere o token e copie"
            echo "5. Substitua o secret COPILOT_BUSINESS_TOKEN com o novo token"
            echo ""
            echo "Nota: O novo token começará com 'github_pat_' em vez de 'ghp_'"
            exit 1
          fi
          
          # Testa acesso ao Copilot
          copilot --version
          
          echo "✅ Copilot CLI pronto (usando GITHUB_TOKEN do ambiente)"
          echo "✅ Token tipo: Fine-Grained (compatível com Copilot)"
          
          # Testa autenticação com Copilot
          echo ""
          echo "🔍 Testando autenticação com Copilot..."
          
          # Faz um teste simples de prompt
          TEST_RESULT=$(copilot -p "test" 2>&1 || true)
          
          if echo "$TEST_RESULT" | grep -q "Authentication failed"; then
            echo ""
            echo "❌ ERRO: Token não tem permissão 'Copilot Chat' ou 'Copilot Requests'"
            echo ""
            echo "🔧 Como adicionar a permissão faltante:"
            echo ""
            echo "1. Acesse: https://github.com/settings/tokens"
            echo "2. Encontre seu token 'Copilot Business Token'"
            echo "3. Clique no nome do token para editar"
            echo "4. Role até 'Account permissions' (não 'Repository permissions')"
            echo "5. Encontre e habilite:"
            echo "   • ✅ Copilot Chat: Read and write (ou Read)"
            echo "   OU"
            echo "   • ✅ Copilot: Read"
            echo "6. Clique em 'Update token' no final da página"
            echo "7. Execute o workflow novamente"
            echo ""
            echo "⚠️  IMPORTANTE: Essa é uma permissão de CONTA (Account permissions),"
            echo "   não de repositório (Repository permissions)!"
            exit 1
          fi
          
          echo "✅ Autenticação com Copilot OK"
      
      - name: ✅ Verify Business Plan & Features
        env:
          GH_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "═══════════════════════════════════════"
          echo "🔍 VERIFICANDO PLANO COPILOT BUSINESS"
          echo "═══════════════════════════════════════"
          echo ""
          
          # Verifica status do GitHub CLI
          echo "📊 Status da conta:"
          gh auth status || echo "  Token configurado via GH_TOKEN"
          echo ""
          
          # Verifica token Copilot
          echo "🔑 Token Copilot:"
          if [ -n "$GITHUB_TOKEN" ]; then
            echo "  ✅ COPILOT_BUSINESS_TOKEN configurado"
          else
            echo "  ❌ COPILOT_BUSINESS_TOKEN não encontrado"
          fi
          echo ""
          
          # Informa modelos disponíveis no Business
          echo "🤖 Modelos disponíveis no Copilot Business:"
          echo "  ✅ GPT-4"
          echo "  ✅ GPT-4 Turbo"
          echo "  ✅ Claude 3.5 Sonnet"
          echo "  ✅ Claude Sonnet 4.5 (se disponível)"
          echo ""
          
          echo "═══════════════════════════════════════"
      
      # ========================================
      # FASE 2: CONFIGURAÇÃO DO AGENTE
      # ========================================
      
      - name: ⚙️ Configure Agent Settings
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "⚙️ Configurando agente Copilot..."
          echo ""
          echo "🤖 Modelo selecionado: ${{ github.event.inputs.model }}"
          echo "🌡️  Temperatura: 0.3 (precisão alta)"
          echo "📏 Max tokens: 8000"
          echo ""
          echo "✅ Configurações preparadas para uso"
      
      # ========================================
      # FASE 3: AGENTE AUTÔNOMO
      # ========================================
      
      - name: 🤖 Run Copilot Agent (Autonomous Mode)
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "═══════════════════════════════════════"
          echo "🤖 COPILOT AGENT - MODO AUTÔNOMO"
          echo "═══════════════════════════════════════"
          echo ""
          echo "📝 Instrução: ${{ github.event.inputs.instruction }}"
          echo "🤖 Modelo: ${{ github.event.inputs.model }}"
          echo ""
          
          # Configura git para ambientes de CI/CD
          echo "🔧 Configurando ambiente não-interativo..."
          git config --global --add safe.directory '*'
          git config --global user.name "GitHub Copilot Agent"
          git config --global user.email "copilot-agent@github.com"
          
          # Dá permissões de escrita ao agente
          echo "🔓 Habilitando permissões de escrita..."
          chmod -R u+w .
          find . -type f -exec chmod u+w {} + 2>/dev/null || true
          echo "✅ Permissões habilitadas"
          echo ""
          
          # Configura aprovação automática do Copilot CLI (igual ao VS Code)
          echo "🤖 Habilitando aprovação automática..."
          mkdir -p ~/.config/github-copilot
          cat > ~/.config/github-copilot/config.json << 'CONFIG_EOF'
          {
            "autoApprove": true,
            "autoApproveEdits": true,
            "confirmBeforeRunning": false,
            "interactive": false
          }
          CONFIG_EOF
          echo "✅ Aprovação automática habilitada"
          echo ""
          
          # Executa o agente com aprovação automática
          echo "🚀 Iniciando agente Copilot..."
          echo "⏱️  Timeout: 5 minutos"
          echo "🤖 Modo: Auto-aprovação nativa (via config)"
          echo ""
          
          timeout 300s copilot --allow-all-tools -p "${{ github.event.inputs.instruction }}" 2>&1 | tee /tmp/copilot_output.log || {
            EXIT_CODE=$?
            echo ""
            if [ $EXIT_CODE -eq 124 ]; then
              echo "⏱️  Timeout após 5 minutos"
              echo "💡 O agente pode ter tentado muitas ações ou arquivos muito grandes"
            else
              echo "⚠️  Agente finalizou com código: $EXIT_CODE"
              echo "📋 Últimas linhas do log:"
              tail -20 /tmp/copilot_output.log | sed 's/^/  /'
            fi
          }
          
          echo ""
          echo "═══════════════════════════════════════"
          echo "✨ AGENTE CONCLUÍDO"
          echo "═══════════════════════════════════════"
          echo ""
          
          # Mostra o que foi modificado
          echo "📊 Arquivos modificados pelo agente:"
          if [ -n "$(git status --porcelain)" ]; then
            git status --short | sed 's/^/  /'
          else
            echo "  (nenhum arquivo modificado)"
          fi
          echo ""
          
          echo "📈 Estatísticas das mudanças:"
          if [ -n "$(git diff --stat)" ]; then
            git diff --stat | sed 's/^/  /'
          else
            echo "  (sem mudanças)"
          fi
      
      # ========================================
      # FASE 4: COMMIT E PR
      # ========================================
      
      - name: 📊 Show Changes
        run: |
          echo "📋 Resumo das alterações:"
          echo ""
          git status --short
          echo ""
          echo "📝 Diff das alterações:"
          git diff --stat
      
      - name: 🔀 Create Branch & Commit
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Verifica se o agente já fez commit
          INITIAL_COMMIT="${{ github.sha }}"
          CURRENT_COMMIT=$(git rev-parse HEAD)
          
          if [ "$INITIAL_COMMIT" != "$CURRENT_COMMIT" ]; then
            # ✅ Agente já commitou
            echo "✅ Agente já fez commit automaticamente"
            echo "📝 Commit: $(git log -1 --oneline)"
            echo ""
            
            # Cria branch a partir do commit atual
            BRANCH="copilot-agent/edits-$(date +%s)"
            echo "BRANCH=$BRANCH" >> $GITHUB_ENV
            
            # Move o commit para uma nova branch
            git branch "$BRANCH"
            git reset --hard "$INITIAL_COMMIT"
            git checkout "$BRANCH"
            
            echo "✅ Branch criada: $BRANCH"
            echo "📊 Arquivos modificados: $(git diff --name-only HEAD~1 | wc -l)"
          else
            # ❌ Agente não commitou, verifica se há mudanças não-commitadas
            if [ -z "$(git status --porcelain)" ]; then
              echo "ℹ️ Nenhuma alteração foi feita pelo agente"
              exit 0
            fi
            
            echo "📝 Agente modificou arquivos mas não commitou"
            echo "🔨 Criando commit manualmente..."
            echo ""
            
            # Cria branch
            BRANCH="copilot-agent/edits-$(date +%s)"
            echo "BRANCH=$BRANCH" >> $GITHUB_ENV
            
            git checkout -b "$BRANCH"
            
            # Remove arquivos grandes e temporários antes de commitar
            rm -f copilot.tar.gz
            git rm --cached copilot.tar.gz 2>/dev/null || true
            
            git add -A
            
            # Commit detalhado
            MODIFIED_FILES=$(git status --short | wc -l)
            cat > /tmp/commit_msg.txt <<EOF
          🤖 Alterações do Copilot Agent (Business Plan)

          📝 Instrução: ${{ github.event.inputs.instruction }}
          🤖 Modelo: ${{ github.event.inputs.model }}
          ✅ Arquivos modificados: $MODIFIED_FILES
          📅 Data: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ---
          Gerado automaticamente pelo GitHub Copilot CLI (Business Plan)
          Modo: Agente Autônomo
          EOF
            
            git commit -F /tmp/commit_msg.txt
            
            echo "✅ Commit criado na branch: $BRANCH"
          fi
      
      - name: 🚀 Push & Create PR
        if: env.BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}  # PAT permite editar workflows
        run: |
          git push origin "${{ env.BRANCH }}"
          
          # Detecta arquivos modificados (commit do agente ou mudanças não-commitadas)
          if git diff --quiet HEAD~1 2>/dev/null; then
            FILES_CHANGED="Nenhum arquivo modificado"
          else
            FILES_CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || git diff --name-only --cached 2>/dev/null || echo "(não detectado)")
          fi
          
          gh pr create \
            --title "🤖 Copilot Agent: ${{ github.event.inputs.instruction }}" \
            --body "## 🤖 Alterações Automáticas do Copilot Agent

          ### Detalhes da Execução

          - **🏢 Plano**: GitHub Copilot Business
          - **🤖 Modelo**: \`${{ github.event.inputs.model }}\`
          - **📝 Instrução**: ${{ github.event.inputs.instruction }}
          - **✅ Arquivos modificados**: $(echo "$FILES_CHANGED" | wc -l)
          - **📅 Data**: $(date -u +'%d/%m/%Y %H:%M UTC')
          - **⚙️  Modo**: Agente Autônomo
          - **🔄 Tipo de commit**: $([ \"$INITIAL_COMMIT\" != \"$CURRENT_COMMIT\" ] && echo \"Agente (auto)\" || echo \"Workflow (manual)\")

          ### Arquivos Alterados

          \`\`\`
          $FILES_CHANGED
          \`\`\`

          ### Revisão

          Por favor, revise as alterações antes de fazer merge. Todas as edições foram feitas pelo agente Copilot usando o modelo **${{ github.event.inputs.model }}**.

          ---
          *Gerado automaticamente via GitHub Copilot CLI (Business Plan)*
          " \
                      --base main || echo "⚠️ Erro ao criar PR"
      
      - name: 📊 Execution Summary
        if: always()
        run: |
          # Detecta se o agente commitou ou se o workflow commitou
          INITIAL_COMMIT="${{ github.sha }}"
          CURRENT_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "$INITIAL_COMMIT")
          
          if [ "$INITIAL_COMMIT" != "$CURRENT_COMMIT" ]; then
            COMMIT_TYPE="✅ Agente (automático)"
            FILES_COUNT=$(git diff --name-only HEAD~1 2>/dev/null | wc -l || echo 0)
          else
            COMMIT_TYPE="🔨 Workflow (manual)"
            FILES_COUNT=$(git status --short 2>/dev/null | wc -l || echo 0)
          fi
          
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🤖 Copilot Agent Execution Report
          
          ## ✅ Verificação do Plano
          
          - **Plano**: GitHub Copilot **Business**
          - **Modelo usado**: \`${{ github.event.inputs.model }}\`
          - **Status**: Autenticado e verificado
          
          ## 📊 Estatísticas
          
          - **Arquivos modificados**: $FILES_COUNT
          - **Tipo de commit**: $COMMIT_TYPE
          - **Modo**: Agente Autônomo (sem restrições)
          
          ## 📝 Instrução Executada
          
          > ${{ github.event.inputs.instruction }}
          
          ## 🔗 Links
          
          - **Branch**: \`${{ env.BRANCH }}\`
          - **Pull Request**: Criado automaticamente
          
          ---
          *Powered by GitHub Copilot Business*
          EOF
