name: Resumo do Repositório com Copilot (Python)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Baixar Copilot CLI (binário v1.0.48)
        run: |
          curl -L -o copilot-cli.tar.gz \
            https://github.com/github/copilot-cli/releases/download/v1.0.48/copilot-linux-x64.tar.gz
          tar -xzf copilot-cli.tar.gz
          sudo mv copilot /usr/local/bin/copilot

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar dependências (se necessário)
        run: pip install -r requirements.txt || true

      - name: Rodar script Python para gerar resumo
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: python scripts/generate_summary.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SUMMARY.md
          git commit -m "Resumo do repositório gerado pelo Copilot via script Python"
          git push

