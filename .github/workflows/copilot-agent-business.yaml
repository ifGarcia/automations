name: 🤖 Copilot CLI Agent (Business Plan) - File Editor

on:
  workflow_dispatch:
    inputs:
      target_files:
        description: 'Padrão de arquivos (ex: *.py, *.yaml, **/*.js)'
        required: false
        default: '*.py'
      instruction:
        description: 'Instrução para o agente'
        required: false
        default: 'Adicione comentários técnicos explicativos em português'
      max_files:
        description: 'Máximo de arquivos a processar'
        required: false
        default: '20'
      model:
        description: 'Modelo a usar'
        required: false
        default: 'claude-sonnet-4.5'
        type: choice
        options:
          - claude-sonnet-4.5
          - claude-3.5-sonnet
          - gpt-4
          - gpt-4-turbo

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-agent:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # FASE 1: SETUP E VERIFICAÇÃO
      # ========================================
      
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install GitHub Copilot CLI
        run: |
          echo "📦 Instalando Copilot CLI..."
          curl -fsSL https://github.com/github/copilot-cli/releases/latest/download/copilot-linux-x64.tar.gz -o copilot.tar.gz
          tar -xzf copilot.tar.gz
          sudo mv copilot /usr/local/bin/
          chmod +x /usr/local/bin/copilot
          
          echo "✅ Copilot CLI instalado"
          copilot --version
      
      - name: 🔐 Authenticate Copilot Business
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "🔐 Autenticando com plano Business..."
          
          # Autentica via GitHub CLI (método preferido)
          echo "$GITHUB_TOKEN" | gh auth login --with-token
          
          # Configura Copilot para usar a autenticação
          gh auth setup-git
          
          echo "✅ Autenticação concluída"
      
      - name: ✅ Verify Business Plan & Features
        run: |
          echo "═══════════════════════════════════════"
          echo "🔍 VERIFICANDO PLANO COPILOT BUSINESS"
          echo "═══════════════════════════════════════"
          echo ""
          
          # Verifica status
          echo "📊 Status da conta:"
          gh copilot status || copilot auth status
          echo ""
          
          # Lista features disponíveis
          echo "✨ Features disponíveis:"
          gh copilot config list 2>/dev/null || copilot config list
          echo ""
          
          # Verifica acesso a modelos premium
          echo "🤖 Modelos disponíveis:"
          gh copilot models list 2>/dev/null || echo "  - GPT-4, GPT-4 Turbo, Claude Sonnet (Business)"
          echo ""
          
          echo "═══════════════════════════════════════"
      
      # ========================================
      # FASE 2: CONFIGURAÇÃO DO AGENTE
      # ========================================
      
      - name: ⚙️ Configure Agent Settings
        run: |
          echo "⚙️ Configurando agente Copilot..."
          
          # Define modelo
          gh copilot config set model "${{ github.event.inputs.model }}" || \
            copilot config set model "${{ github.event.inputs.model }}"
          
          # Configurações de geração
          gh copilot config set temperature 0.3 || true
          gh copilot config set max_tokens 8000 || true
          
          echo ""
          echo "📋 Configuração aplicada:"
          gh copilot config list || copilot config list
      
      - name: 📂 Scan Repository Files
        id: scan
        run: |
          echo "📂 Escaneando arquivos do repositório..."
          
          # Busca arquivos baseado no padrão
          PATTERN="${{ github.event.inputs.target_files }}"
          MAX_FILES="${{ github.event.inputs.max_files }}"
          
          # Busca arquivos
          find . -type f -name "$PATTERN" \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -not -path "*/venv/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            | head -n "$MAX_FILES" \
            > /tmp/target_files.txt
          
          FILE_COUNT=$(wc -l < /tmp/target_files.txt)
          
          echo "✅ Encontrados $FILE_COUNT arquivos para processar"
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          
          echo ""
          echo "📄 Arquivos que serão editados:"
          cat /tmp/target_files.txt | sed 's/^/  - /'
      
      # ========================================
      # FASE 3: EDIÇÃO DE ARQUIVOS
      # ========================================
      
      - name: 🤖 Run Copilot Agent - Edit Files
        run: |
          echo "═══════════════════════════════════════"
          echo "🤖 INICIANDO EDIÇÃO COM COPILOT AGENT"
          echo "═══════════════════════════════════════"
          echo ""
          echo "📝 Instrução: ${{ github.event.inputs.instruction }}"
          echo "🤖 Modelo: ${{ github.event.inputs.model }}"
          echo "📊 Arquivos: ${{ steps.scan.outputs.file_count }}"
          echo ""
          
          MODIFIED_COUNT=0
          
          while IFS= read -r file; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📝 Processando: $file"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
