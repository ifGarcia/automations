name: Copilot Agent Repo-wide Changes (one commit per file)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history, writable)
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug runner environment (diagnose permissions)
        run: |
          echo "=== Runner user and env ==="
          whoami && id
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          echo "Listing repo root:"
          ls -la "$GITHUB_WORKSPACE" || true
          echo "RUNNER_TEMP=$RUNNER_TEMP"
          df -h .
          echo "Try writing a test file in workspace..."
          TESTFILE="$GITHUB_WORKSPACE/.write_test_$$.txt"
          if touch "$TESTFILE" 2>/dev/null; then
            echo "WRITE OK: $TESTFILE"
            rm -f "$TESTFILE"
          else
            echo "ERROR: workspace is not writable. Aborting."
            exit 1
          fi

      - name: Download Copilot CLI v1.0.48
        run: |
          curl -L -o copilot-cli.tar.gz \
            https://github.com/github/copilot-cli/releases/download/v1.0.48/copilot-linux-x64.tar.gz
          tar -xzf copilot-cli.tar.gz
          sudo mv copilot /usr/local/bin/copilot
          copilot --version

      - name: Authenticate GitHub CLI (non-interactive)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prefer GH_TOKEN (PAT) if provided; otherwise use GITHUB_TOKEN
          if [ -n "$GH_TOKEN" ]; then
            echo "Using GH_TOKEN from secrets"
            echo "$GH_TOKEN" | gh auth login --with-token
          else
            echo "GH_TOKEN not set; falling back to GITHUB_TOKEN (repo-scoped)"
            echo "$GITHUB_TOKEN" | gh auth login --with-token
          fi
          gh auth status

      - name: Create working branch
        id: branch
        run: |
          BRANCH="copilot/agent-changes-$(date +%s)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"

      - name: Ask Copilot to generate a git patch (streaming)
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          cd "$GITHUB_WORKSPACE"
          PROMPT='Você é um mantenedor experiente de repositórios. Analise todo o repositório (todos os arquivos de texto legíveis) e gere um único patch git unificado (diff -u) que adiciona **comentários técnicos** relevantes a cada documento, baseados no conteúdo e contexto do próprio arquivo. Siga as regras estritas: (respeitar tipos de arquivo, não quebrar JSON, usar arquivos .comments.md para JSON, não alterar lógica, saída apenas unified diff pronto para git apply). Gere o patch agora.'
          # Stream output to changes.patch and to logs
          copilot -p "$PROMPT" | tee changes.patch

      - name: Show generated patch head (for quick review)
        run: |
          echo "=== changes.patch (first 400 lines) ==="
          head -n 400 changes.patch || true
          echo "=== changes.patch (last 40 lines) ==="
          tail -n 40 changes.patch || true

      - name: Validate patch format
        run: |
          if [ ! -s changes.patch ]; then
            echo "Patch is empty or missing"; exit 1
          fi
          if ! grep -q '^diff --git' changes.patch; then
            echo "Patch does not look like a unified git diff (missing 'diff --git')"; exit 1
          fi
          echo "Patch basic validation passed"

      - name: Dry-run apply (safety check)
        run: |
          cd "$GITHUB_WORKSPACE"
          git apply --check changes.patch

      - name: Apply patch to working tree
        run: |
          cd "$GITHUB_WORKSPACE"
          # Apply the patch to working tree
          git apply changes.patch
          echo "Files changed by patch (git status):"
          git status --porcelain | sed -n '1,200p'

      - name: Commit changes one file at a time
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          # Ensure git user configured
          git config user.name "${GITHUB_ACTOR:-github-actions[bot]}"
          git config user.email "${GITHUB_ACTOR:-github-actions[bot]}@users.noreply.github.com"
          FILES=$(git diff --name-only)
          if [ -z "$FILES" ]; then
            echo "No files changed by patch; nothing to commit"
            exit 0
          fi
          # Create a commit per file
          for f in $FILES; do
            # If file was deleted by patch, stage deletion
            if [ ! -e "$f" ]; then
              git add -A -- "$f" || true
              git commit -m "Apply Copilot-proposed changes (delete) to $f" || echo "No changes staged for $f"
              continue
            fi
            git add -- "$f"
            # Use a clear commit message referencing Copilot
            git commit -m "Apply Copilot-proposed changes to $f" || echo "No changes staged for $f"
          done
          echo "Created commits for each changed file"

      - name: Push branch and create PR
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BRANCH: ${{ env.BRANCH }}
        run: |
          cd "$GITHUB_WORKSPACE"
          git push --set-upstream origin "$BRANCH"
          gh pr create --title "Repo-wide changes proposed by Copilot agent" \
            --body "Automated PR with repository-wide changes suggested by Copilot CLI. Please review each commit (one commit per file)." \
            --base main || echo "gh pr create failed; check permissions or use GH_TOKEN with repo scope"

      - name: Output PR URL
        run: |
          # show PR url if created
          gh pr view --json url -q .url || true
