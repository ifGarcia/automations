name: Criar README com Copilot

on:
  workflow_dispatch:
permissions:
  contents: write   # dá permissão para commit/push
jobs:
  create-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Gerar resumo com Copilot corporativo
        run: |
          curl -X POST "https://api.githubcopilot.com/v1/generate" \
            -H "Authorization: Bearer ${{ secrets.TOKEN_IA }}" \
            -d '{"prompt":"Analise este repositório e escreva um resumo em português explicando o objetivo e principais automações."}' \
            > SUMMARY.md

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SUMMARY.md
          git commit -m "Resumo do repositório gerado pelo Copilot corporativo"
          git push
