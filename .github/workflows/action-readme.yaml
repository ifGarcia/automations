name: Resumo do Repositório com Copilot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Baixar Copilot CLI (binário v1.0.48)
        run: |
          curl -L -o copilot-cli.tar.gz \
            https://github.com/github/copilot-cli/releases/download/v1.0.48/copilot-linux-x64.tar.gz
          tar -xzf copilot-cli.tar.gz
          sudo mv copilot /usr/local/bin/copilot

      - name: Gerar resumo do repositório
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          copilot -p "Analise este repositório e escreva um resumo em português explicando o objetivo e principais automações." > SUMMARY.md

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SUMMARY.md
          git commit -m "Resumo do repositório gerado pelo Copilot (v1.0.48)"
          git push
