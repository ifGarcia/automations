name: 🤖 Copilot CLI Agent (Business Plan) - File Editor

on:
  workflow_dispatch:
    inputs:
      target_files:
        description: 'Padrão de arquivos (ex: *.py, *.yaml, **/*.js)'
        required: false
        default: '*.py'
      instruction:
        description: 'Instrução para o agente'
        required: false
        default: 'Adicione comentários técnicos explicativos em português'
      max_files:
        description: 'Máximo de arquivos a processar'
        required: false
        default: '20'
      model:
        description: 'Modelo a usar'
        required: false
        default: 'claude-sonnet-4.5'
        type: choice
        options:
          - claude-sonnet-4.5
          - claude-3.5-sonnet
          - gpt-4
          - gpt-4-turbo

permissions:
  contents: write
  pull-requests: write

jobs:
  copilot-agent:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # FASE 1: SETUP E VERIFICAÇÃO
      # ========================================
      
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install GitHub Copilot CLI
        run: |
          echo "📦 Instalando Copilot CLI..."
          curl -fsSL https://github.com/github/copilot-cli/releases/latest/download/copilot-linux-x64.tar.gz -o copilot.tar.gz
          tar -xzf copilot.tar.gz
          sudo mv copilot /usr/local/bin/
          chmod +x /usr/local/bin/copilot
          
          echo "✅ Copilot CLI instalado"
          copilot --version
      
      - name: 🔐 Setup GitHub CLI Authentication
        env:
          GH_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "🔐 Configurando autenticação GitHub CLI..."
          
          # GitHub CLI usa GH_TOKEN automaticamente (não-interativo)
          gh auth status
          
          echo "✅ Autenticação configurada"
      
      - name: 🤖 Setup Copilot CLI Authentication
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "🤖 Configurando Copilot CLI..."
          
          # Copilot CLI precisa de GITHUB_TOKEN no ambiente
          # Verifica se o token está disponível
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "❌ ERRO: COPILOT_BUSINESS_TOKEN não está configurado"
            echo "Configure em: Settings → Secrets → COPILOT_BUSINESS_TOKEN"
            exit 1
          fi
          
          # Valida tipo de token (Copilot não aceita Classic PAT)
          if [[ "$GITHUB_TOKEN" == ghp_* ]]; then
            echo "❌ ERRO: Token Clássico (ghp_) não é suportado pelo Copilot CLI"
            echo ""
            echo "O Copilot CLI requer um Fine-Grained Personal Access Token (github_pat_)."
            echo ""
            echo "🔧 Como corrigir:"
            echo "1. Acesse: https://github.com/settings/tokens?type=beta"
            echo "2. Clique em 'Generate new token' (Fine-grained)"
            echo "3. Configure:"
            echo "   - Token name: Copilot Business Token"
            echo "   - Expiration: Escolha a duração"
            echo "   - Repository access: All repositories (ou específicos)"
            echo "   - Permissions:"
            echo "     • Contents: Read and write"
            echo "     • Pull requests: Read and write"
            echo "     • Copilot: Read (se disponível)"
            echo "4. Gere o token e copie"
            echo "5. Substitua o secret COPILOT_BUSINESS_TOKEN com o novo token"
            echo ""
            echo "Nota: O novo token começará com 'github_pat_' em vez de 'ghp_'"
            exit 1
          fi
          
          # Testa acesso ao Copilot
          copilot --version
          
          echo "✅ Copilot CLI pronto (usando GITHUB_TOKEN do ambiente)"
          echo "✅ Token tipo: Fine-Grained (compatível com Copilot)"
          
          # Testa autenticação com Copilot
          echo ""
          echo "🔍 Testando autenticação com Copilot..."
          
          # Faz um teste simples de prompt
          TEST_RESULT=$(copilot -p "test" 2>&1 || true)
          
          if echo "$TEST_RESULT" | grep -q "Authentication failed"; then
            echo ""
            echo "❌ ERRO: Token não tem permissão 'Copilot Chat' ou 'Copilot Requests'"
            echo ""
            echo "🔧 Como adicionar a permissão faltante:"
            echo ""
            echo "1. Acesse: https://github.com/settings/tokens"
            echo "2. Encontre seu token 'Copilot Business Token'"
            echo "3. Clique no nome do token para editar"
            echo "4. Role até 'Account permissions' (não 'Repository permissions')"
            echo "5. Encontre e habilite:"
            echo "   • ✅ Copilot Chat: Read and write (ou Read)"
            echo "   OU"
            echo "   • ✅ Copilot: Read"
            echo "6. Clique em 'Update token' no final da página"
            echo "7. Execute o workflow novamente"
            echo ""
            echo "⚠️  IMPORTANTE: Essa é uma permissão de CONTA (Account permissions),"
            echo "   não de repositório (Repository permissions)!"
            exit 1
          fi
          
          echo "✅ Autenticação com Copilot OK"
      
      - name: ✅ Verify Business Plan & Features
        env:
          GH_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "═══════════════════════════════════════"
          echo "🔍 VERIFICANDO PLANO COPILOT BUSINESS"
          echo "═══════════════════════════════════════"
          echo ""
          
          # Verifica status do GitHub CLI
          echo "📊 Status da conta:"
          gh auth status || echo "  Token configurado via GH_TOKEN"
          echo ""
          
          # Verifica token Copilot
          echo "🔑 Token Copilot:"
          if [ -n "$GITHUB_TOKEN" ]; then
            echo "  ✅ COPILOT_BUSINESS_TOKEN configurado"
          else
            echo "  ❌ COPILOT_BUSINESS_TOKEN não encontrado"
          fi
          echo ""
          
          # Informa modelos disponíveis no Business
          echo "🤖 Modelos disponíveis no Copilot Business:"
          echo "  ✅ GPT-4"
          echo "  ✅ GPT-4 Turbo"
          echo "  ✅ Claude 3.5 Sonnet"
          echo "  ✅ Claude Sonnet 4.5 (se disponível)"
          echo ""
          
          echo "═══════════════════════════════════════"
      
      # ========================================
      # FASE 2: CONFIGURAÇÃO DO AGENTE
      # ========================================
      
      - name: ⚙️ Configure Agent Settings
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "⚙️ Configurando agente Copilot..."
          echo ""
          echo "🤖 Modelo selecionado: ${{ github.event.inputs.model }}"
          echo "🌡️  Temperatura: 0.3 (precisão alta)"
          echo "📏 Max tokens: 8000"
          echo ""
          echo "✅ Configurações preparadas para uso"
      
      - name: 📂 Scan Repository Files
        id: scan
        run: |
          echo "📂 Escaneando arquivos do repositório..."
          
          # Busca arquivos baseado no padrão
          PATTERN="${{ github.event.inputs.target_files }}"
          MAX_FILES="${{ github.event.inputs.max_files }}"
          
          # Busca arquivos
          find . -type f -name "$PATTERN" \
            -not -path "*/node_modules/*" \
            -not -path "*/.git/*" \
            -not -path "*/venv/*" \
            -not -path "*/__pycache__/*" \
            -not -path "*/dist/*" \
            -not -path "*/build/*" \
            | head -n "$MAX_FILES" \
            > /tmp/target_files.txt
          
          FILE_COUNT=$(wc -l < /tmp/target_files.txt)
          
          echo "✅ Encontrados $FILE_COUNT arquivos para processar"
          echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT
          
          echo ""
          echo "📄 Arquivos que serão editados:"
          cat /tmp/target_files.txt | sed 's/^/  - /'
      
      # ========================================
      # FASE 3: EDIÇÃO DE ARQUIVOS
      # ========================================
      
      - name: 🤖 Run Copilot Agent - Edit Files
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_BUSINESS_TOKEN }}
        run: |
          echo "═══════════════════════════════════════"
          echo "🤖 INICIANDO EDIÇÃO COM COPILOT AGENT"
          echo "═══════════════════════════════════════"
          echo ""
          echo "📝 Instrução: ${{ github.event.inputs.instruction }}"
          echo "🤖 Modelo: ${{ github.event.inputs.model }}"
          echo "📊 Arquivos: ${{ steps.scan.outputs.file_count }}"
          echo ""
          
          MODIFIED_COUNT=0
          
          while IFS= read -r file; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📝 Processando: $file"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Cria prompt usando printf (evita problemas com heredoc no YAML)
            printf "Você é um agente de código. Modifique o arquivo seguindo a instrução.\n\n" > /tmp/copilot_prompt.txt
            printf "Arquivo: %s\n\n" "$file" >> /tmp/copilot_prompt.txt
            printf "Instrução: %s\n\n" "${{ github.event.inputs.instruction }}" >> /tmp/copilot_prompt.txt
            printf "Conteúdo atual:\n" >> /tmp/copilot_prompt.txt
            cat "$file" >> /tmp/copilot_prompt.txt
            printf "\n\n" >> /tmp/copilot_prompt.txt
            printf "Retorne APENAS o código modificado completo (sem explicações, sem markdown):\n" >> /tmp/copilot_prompt.txt
            
            # Mostra info do prompt
            PROMPT_SIZE=$(wc -c < /tmp/copilot_prompt.txt)
            echo "  📏 Tamanho do prompt: $PROMPT_SIZE bytes"
            echo "  🔄 Enviando para Copilot CLI..."
            
            # Chama Copilot CLI com timeout maior (3 minutos)
            timeout 180s copilot -p "$(cat /tmp/copilot_prompt.txt)" > /tmp/new_content.txt 2>&1 &
            COPILOT_PID=$!
            
            # Mostra progresso enquanto aguarda
            ELAPSED=0
            while kill -0 $COPILOT_PID 2>/dev/null; do
              sleep 5
              ELAPSED=$((ELAPSED + 5))
              if [ $ELAPSED -le 180 ]; then
                echo "  ⏳ Aguardando resposta... ${ELAPSED}s"
              fi
            done
            
            # Pega o exit code
            wait $COPILOT_PID
            EXIT_CODE=$?
            
            # Verifica timeout
            if [ $EXIT_CODE -eq 124 ]; then
              echo "  ⏱️  Timeout ao processar arquivo (>180s)"
              echo "  💡 Dica: Arquivo pode ser muito grande ou instrução muito complexa"
              continue
            fi
            
            # Verifica se houve erro
            if [ $EXIT_CODE -ne 0 ]; then
              echo "  ⚠️  Erro ao chamar Copilot CLI (exit code: $EXIT_CODE)"
              echo "  Primeiras linhas da saída:"
              head -5 /tmp/new_content.txt | sed 's/^/    /'
              continue
            fi
            
            echo "  ✅ Resposta recebida do Copilot"
            
            # Verifica se gerou conteúdo
            if [ ! -s /tmp/new_content.txt ]; then
              echo "  ⚠️  Copilot não retornou conteúdo"
              continue
            fi
            
            # Verifica se retornou mensagens de erro do Copilot CLI
            if grep -qi "error\|failed\|✗" /tmp/new_content.txt | head -1; then
              echo "  ⚠️  Copilot retornou erro:"
              grep -i "error\|failed\|✗" /tmp/new_content.txt | head -3 | sed 's/^/    /'
              continue
            fi
            
            # Remove linhas vazias no início e fim
            sed -i '/^$/d' /tmp/new_content.txt
            
            # Remove marcadores de código se houver
            sed -i 's/^```[a-z]*$//' /tmp/new_content.txt
            sed -i '/^```$/d' /tmp/new_content.txt
            
            # Verifica se o conteúdo parece válido (tem pelo menos algumas linhas)
            LINE_COUNT=$(wc -l < /tmp/new_content.txt)
            if [ "$LINE_COUNT" -lt 3 ]; then
              echo "  ⚠️  Conteúdo retornado muito curto ($LINE_COUNT linhas)"
              continue
            fi
            
            # Backup do arquivo original
            cp "$file" "${file}.backup"
            
            # Substitui o arquivo
            cp /tmp/new_content.txt "$file"
            
            # Verifica se houve mudanças
            if git diff --quiet "$file"; then
              echo "  ⏭️  Sem alterações necessárias"
              # Restaura backup
              mv "${file}.backup" "$file"
            else
              echo "  ✅ Arquivo modificado pelo agente"
              echo "  📊 Diferenças:"
              git diff --stat "$file" | sed 's/^/    /'
              rm -f "${file}.backup"
              MODIFIED_COUNT=$((MODIFIED_COUNT + 1))
            fi
            
            echo ""
            
            # Limpa temporários
            rm -f /tmp/new_content.txt /tmp/copilot_prompt.txt
            
          done < /tmp/target_files.txt
          
          echo "═══════════════════════════════════════"
          echo "✨ EDIÇÃO CONCLUÍDA"
          echo "═══════════════════════════════════════"
          echo "📊 Arquivos modificados: $MODIFIED_COUNT"
          echo ""
          
          echo "modified_count=$MODIFIED_COUNT" >> $GITHUB_OUTPUT
      
      # ========================================
      # FASE 4: COMMIT E PR
      # ========================================
      
      - name: 📊 Show Changes
        run: |
          echo "📋 Resumo das alterações:"
          echo ""
          git status --short
          echo ""
          echo "📝 Diff das alterações:"
          git diff --stat
      
      - name: 🔀 Create Branch & Commit
        if: success()
        run: |
          # Verifica se há alterações
          if [ -z "$(git status --porcelain)" ]; then
            echo "ℹ️ Nenhuma alteração foi feita"
            exit 0
          fi
          
          # Cria branch
          BRANCH="copilot-agent/edits-$(date +%s)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH"
          git add -A
          
          # Commit detalhado
          cat > /tmp/commit_msg.txt <<EOF
          🤖 Alterações do Copilot Agent (Business Plan)

          📝 Instrução: ${{ github.event.inputs.instruction }}
          🤖 Modelo: ${{ github.event.inputs.model }}
          📊 Arquivos processados: ${{ steps.scan.outputs.file_count }}
          ✅ Arquivos modificados: $MODIFIED_COUNT
          📅 Data: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ---
          Gerado automaticamente pelo GitHub Copilot CLI (Business Plan)
          EOF
          
          git commit -F /tmp/commit_msg.txt
          
          echo "✅ Commit criado na branch: $BRANCH"
      
      - name: 🚀 Push & Create PR
        if: env.BRANCH != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${{ env.BRANCH }}"
          
          gh pr create \
            --title "🤖 Copilot Agent: ${{ github.event.inputs.instruction }}" \
            --body "## 🤖 Alterações Automáticas do Copilot Agent

          ### Detalhes da Execução

          - **🏢 Plano**: GitHub Copilot Business
          - **🤖 Modelo**: \`${{ github.event.inputs.model }}\`
          - **📝 Instrução**: ${{ github.event.inputs.instruction }}
          - **📊 Arquivos processados**: ${{ steps.scan.outputs.file_count }}
          - **✅ Arquivos modificados**: $MODIFIED_COUNT
          - **📅 Data**: $(date -u +'%d/%m/%Y %H:%M UTC')

          ### Arquivos Alterados

          \`\`\`
          $(git diff --name-only HEAD~1)
          \`\`\`

          ### Revisão

          Por favor, revise as alterações antes de fazer merge. Todas as edições foram feitas pelo agente Copilot usando o modelo **${{ github.event.inputs.model }}**.

          ---
          *Gerado automaticamente via GitHub Copilot CLI (Business Plan)*
          " \
                      --base main || echo "⚠️ Erro ao criar PR"
      
      - name: 📊 Execution Summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🤖 Copilot Agent Execution Report
          
          ## ✅ Verificação do Plano
          
          - **Plano**: GitHub Copilot **Business**
          - **Modelo usado**: \`${{ github.event.inputs.model }}\`
          - **Status**: Autenticado e verificado
          
          ## 📊 Estatísticas
          
          - **Arquivos escaneados**: ${{ steps.scan.outputs.file_count }}
          - **Arquivos modificados**: $MODIFIED_COUNT
          - **Padrão de arquivos**: \`${{ github.event.inputs.target_files }}\`
          
          ## 📝 Instrução Executada
          
          > ${{ github.event.inputs.instruction }}
          
          ## 🔗 Links
          
          - **Branch**: \`${{ env.BRANCH }}\`
          - **Pull Request**: Criado automaticamente
          
          ---
          *Powered by GitHub Copilot Business*
          EOF
