name: Criar README com Copilot

on:
  workflow_dispatch:
permissions:
  contents: write   # dá permissão para commit/push
jobs:
  create-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # - name: Instalar Copilot CLI
      #   run: |
      #     curl -L -o copilot-cli.tar.gz https://github.com/githubnext/copilot-cli/releases/latest/download/copilot-cli-linux-x64.tar.gz
      #     tar -xzf copilot-cli.tar.gz
      #     sudo mv copilot /usr/local/bin/copilot

      - name: Gerar README com IA
        run: |
          curl -X POST "https://api.githubcopilot.com/v1/generate" \
            -H "Authorization: Bearer ${{ secrets.TOKEN_IA }}" \
            -d '{"prompt":"Crie um README.md para este repositório"}' \
            > README.md

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Adicionando README.md gerado pelo Copilot"
          git push
